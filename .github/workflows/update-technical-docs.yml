name: update-technical-docs

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process (use for retroactive backfill when label was added after merge)'
        required: true
        type: number
      force:
        description: 'Skip the docs:technical label check (use only for exceptional cases)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  create-docs-issue:
    # Automatic path: only run when the PR was actually merged
    # Manual path: always run (validation happens inside the script)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'docs:technical'))

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Create Copilot docs-update issue
        id: create-docs-issue
        uses: actions/github-script@v7
        with:
          script: |
            // ── Resolve PR data ─────────────────────────────────────────────
            let pr;

            if (context.eventName === 'workflow_dispatch') {
              const prNumber = Number(context.payload.inputs.pr_number);
              const force    = context.payload.inputs.force === 'true';

              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: prNumber,
              });
              pr = data;

              if (!pr.merged) {
                core.setFailed(`PR #${prNumber} has not been merged yet. Only merged PRs can trigger a docs update.`);
                return;
              }

              const hasLabel = pr.labels.some(l => l.name === 'docs:technical');
              if (!hasLabel && !force) {
                core.setFailed(
                  `PR #${prNumber} does not have the 'docs:technical' label. ` +
                  `Add the label to the PR or re-run with force=true to bypass this check.`
                );
                return;
              }
            } else {
              pr = context.payload.pull_request;
            }

            // ── Idempotency guard ────────────────────────────────────────────
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'docs:technical-pending',
              per_page: 50,
            });

            const duplicate = existingIssues.data.find(issue =>
              issue.title.includes(`PR #${pr.number}`)
            );

            if (duplicate) {
              core.warning(`Skipping: open docs-update issue already exists for PR #${pr.number}: ${duplicate.html_url}`);
              return;
            }

            // ── Fetch changed files ──────────────────────────────────────────
            const filesResponse = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changedFiles = filesResponse.map(f => `- \`${f.filename}\` (${f.status})`).join('\n');

            // ── Build issue body ─────────────────────────────────────────────
            const body = `\
            ## Task: Update Technical Documentation

            This issue was automatically created because PR #${pr.number} — **"${pr.title}"** — was merged with the \`docs:technical\` label.

            **Your goal:** Update the relevant files in \`docs/technical/\` to reflect any changes to architecture, testing, CI/CD, installation, authorization, or other technical concerns introduced by that PR.

            ---

            ### Source PR

            - **PR:** [#${pr.number} — ${pr.title}](${pr.html_url})
            - **Merged:** ${pr.merged_at}
            - **Author:** @${pr.user.login}

            ### Files changed in PR #${pr.number}

            ${changedFiles}

            ---

            ### Instructions

            1. **Read the changed files** listed above to understand what was added, modified, or removed.
            2. **Read the existing technical docs** in \`docs/technical/\` to understand the current state:
               - \`index.md\` — table of contents
               - \`architecture.md\` — package structure, components, execution flow
               - \`off-stack-development.md\` — developing/testing without SAP
               - \`testing.md\` — test layers (unit, ICF shim, SAP integration)
               - \`cicd.md\` — GitHub Actions workflows
               - \`installation.md\` — abapGit install + HTTP service activation
               - \`authorization.md\` — auth object, activity codes, enforcement
            3. **Determine which technical doc files are affected** by the PR changes:
               - New or restructured packages/classes → update \`architecture.md\`
               - Changed test infrastructure, new test patterns → update \`testing.md\`
               - New or modified GitHub Actions workflows → update \`cicd.md\`
               - Changed installation/setup procedures → update \`installation.md\`
               - Changed authorization model → update \`authorization.md\`
               - New off-stack tooling or dev workflow changes → update \`off-stack-development.md\`
               - Topic doesn't fit any existing file → create a new \`.md\` file and add it to \`index.md\`
               - Internal refactors with no impact on technical documentation → no change needed; close this issue with a comment explaining why.
            4. **Write or update content** following these authoring rules:
               - **Audience**: both contributors to this repo AND external system integrators deploying ZASIS. Match the existing tone of each file — contributor-focused files (e.g., \`architecture.md\`) can use class names and internal details; integrator-focused files (e.g., \`installation.md\`) should remain more accessible.
               - **Tone**: clear, technical, direct. No marketing language.
               - **Scope**: technical internals, development workflows, CI/CD, testing infrastructure. Do NOT update user-facing documentation (\`docs/user/manual.md\`) — that has its own workflow.
               - **Structure**: preserve existing section headings unless a structural change is clearly warranted. Add new sections at the appropriate level.
               - **Accuracy**: only document behavior that actually exists in the codebase. Do not speculate or document planned features.
            5. **Keep \`docs/technical/index.md\` in sync**: if you add, remove, or rename any file in \`docs/technical/\`, update the table of contents in \`index.md\`.
            6. **Do NOT modify \`AGENTS.md\`** — it is maintained separately as an agent-instruction file, not a documentation artifact.
            7. **Create a branch** named \`docs/technical-pr-${pr.number}\` and **open a PR** targeting \`main\` with the updated technical docs.
            8. **PR title**: \`docs: update technical docs for PR #${pr.number} — ${pr.title}\`
            9. **PR description** must include \`Fixes #ISSUE_NUMBER\` (this issue's number) so the issue is automatically closed when the PR merges.

            ---

            ### Definition of Done

            - [ ] Relevant \`docs/technical/\` files updated (or issue closed with documented reason for no change)
            - [ ] \`docs/technical/index.md\` updated if files were added/removed/renamed
            - [ ] PR opened against \`main\` with \`Fixes #ISSUE_NUMBER\` in description
            - [ ] Content reviewed for accuracy against the actual source code
            `;

            // ── Create issue ─────────────────────────────────────────────────
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `docs: update technical docs for PR #${pr.number} — ${pr.title}`,
              body:  body.replace(/^ {12}/gm, ''), // strip template indentation
              labels: ['docs:technical-pending'],
            });

            core.setOutput('issue_number', issue.data.number);
            core.notice(`Created docs-update issue: ${issue.data.html_url}`);

      - name: Assign issue to Copilot agent
        if: steps.create-docs-issue.outputs.issue_number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const issue_number = Number(process.env.ISSUE_NUMBER);

            if (!issue_number || isNaN(issue_number)) {
              core.warning('No issue number available — skipping Copilot assignment.');
              return;
            }

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
              owner,
              repo,
              issue_number,
              assignees: ['copilot-swe-agent[bot]'],
              agent_assignment: {
                target_repo: `${owner}/${repo}`,
                base_branch: 'main',
                custom_instructions: '',
                custom_agent: '',
                model: '',
              },
            });

            core.notice(`Assigned Copilot to issue #${issue_number}`);
        env:
          ISSUE_NUMBER: ${{ steps.create-docs-issue.outputs.issue_number }}
